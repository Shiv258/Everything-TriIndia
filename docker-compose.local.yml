services:
  postgres:
    image: postgres:16-alpine
    container_name: triindia-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: triindia_hospitality
      POSTGRES_USER: triindia
      POSTGRES_PASSWORD: triindia_local_password
    ports:
      - "5432:5432"
    volumes:
      - triindia-postgres-data:/var/lib/postgresql/data

volumes:
  triindia-postgres-data:
